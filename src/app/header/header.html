<div class="header">
  <div class="head">
    <div class="content">
      <div>
        <h1><a routerLink="/"><img src="assets/logo.png" alt="logo"></a></h1>
      </div>
      <div class="header-actions">
        <app-theme-toggle></app-theme-toggle>
        <button class="btn1" routerLink="/ticket-check">ბილეთის შემოწმება/დაბრუნება</button>

        @if (isLoggedIn) {
          <a routerLink="/profile" class="btn-auth">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <circle cx="12" cy="8" r="4"/>
              <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
            </svg>
            <span>{{ userName }}</span>
          </a>
        } @else {
          <a routerLink="/auth" class="btn-auth">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <circle cx="12" cy="8" r="4"/>
              <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
            </svg>
            <span>Sign In / Register</span>
          </a>
        }
      </div>
    </div>
  </div>
</div>
